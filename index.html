<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Churn Dashboard</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #162033;
        --muted: #64748b;
        --accent: #2563eb;
        --accent-soft: #dbeafe;
        --danger: #dc2626;
        --success: #0f766e;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        background: linear-gradient(135deg, #eef4ff 0%, var(--bg) 100%);
        color: var(--text);
      }
      .shell { max-width: 1280px; margin: 0 auto; padding: 24px; }
      .hero {
        display: flex; justify-content: space-between; align-items: center; gap: 16px;
        background: linear-gradient(120deg, #0f172a 0%, #1d4ed8 100%);
        color: white; padding: 24px 28px; border-radius: 24px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.16);
      }
      .eyebrow {
        text-transform: uppercase; letter-spacing: 0.24em; font-size: 0.75rem; opacity: 0.8; margin: 0 0 8px;
      }
      .hero h1 { margin: 0 0 8px; font-size: 2rem; }
      .hero p { margin: 0; max-width: 680px; opacity: 0.92; line-height: 1.5; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; }
      button {
        border: none; border-radius: 999px; padding: 10px 16px; font-weight: 600; cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      button:hover { transform: translateY(-1px); }
      .primary { background: white; color: var(--accent); }
      .secondary { background: rgba(255,255,255,0.16); color: white; border: 1px solid rgba(255,255,255,0.24); }
      .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin: 20px 0; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 18px; box-shadow: 0 8px 30px rgba(15, 23, 42, 0.05); }
      .metric-title { color: var(--muted); font-size: 0.9rem; margin-bottom: 8px; }
      .metric-value { font-size: 1.45rem; font-weight: 700; }
      .metric-subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }
      .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; margin-bottom: 16px; }
      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
      th { color: var(--muted); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.03em; }
      .badge {
        display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 0.8rem; font-weight: 600;
      }
      .badge-risk { background: #fee2e2; color: var(--danger); }
      .badge-safe { background: #ccfbf1; color: var(--success); }
      .muted { color: var(--muted); }
      .status { margin-top: 10px; color: var(--muted); font-size: 0.95rem; }
      .risk-list { display: flex; flex-direction: column; gap: 10px; }
      .risk-item { padding: 12px; border-radius: 12px; background: #f8fafc; border: 1px solid var(--border); }
      .risk-item strong { display: block; margin-bottom: 4px; }
      @media (max-width: 980px) { .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); } .grid { grid-template-columns: 1fr; } }
      @media (max-width: 640px) { .metrics { grid-template-columns: 1fr; } .hero { flex-direction: column; align-items: flex-start; } }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <h1>Analysis</h1>
        </div>
        <div class="actions">
          <button class="primary" onclick="loadSummary()">Refresh dashboard</button>
          <button class="secondary" onclick="uploadFile()">Upload Excel/CSV</button>
        </div>
      </header>

      <section class="metrics" id="metrics"></section>

      <div class="grid">
        <section class="card">
          <h2>At-risk customers</h2>
          <div id="risk-list" class="risk-list"></div>
        </section>
        <section class="card">
          <h2>Customer segments</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Cluster</th><th>Customers</th><th>Avg spend</th><th>Churn rate</th></tr>
              </thead>
              <tbody id="clusters-body"></tbody>
            </table>
          </div>
        </section>
      </div>

      <section class="card">
        <h2>Top customers by historical value</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Customer</th><th>Monetary value</th><th>Churn status</th><th>Cluster</th></tr>
            </thead>
            <tbody id="customers-body"></tbody>
          </table>
        </div>
      </section>

      <div class="grid" style="margin-top:16px;">
        <section class="card">
          <h2>Priority products</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Product</th><th>Revenue</th><th>Units sold</th></tr>
              </thead>
              <tbody id="products-body"></tbody>
            </table>
          </div>
        </section>
        <section class="card">
          <h2>Age segments</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Age band</th><th>Customers</th><th>Avg spend</th><th>Churn rate</th></tr>
              </thead>
              <tbody id="age-body"></tbody>
            </table>
          </div>
        </section>
      </div>

      <p class="status" id="status">Loading latest insight data…</p>
    </div>

    <script>
      const metricsEl = document.getElementById('metrics');
      const riskEl = document.getElementById('risk-list');
      const clustersEl = document.getElementById('clusters-body');
      const customersEl = document.getElementById('customers-body');
      const productsEl = document.getElementById('products-body');
      const ageEl = document.getElementById('age-body');
      const statusEl = document.getElementById('status');

      function formatCurrency(value) {
        const number = Number(value || 0);
        return `$${number.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
      }

      function formatPercent(value) {
        const number = Number(value || 0) * 100;
        return `${number.toFixed(1)}%`;
      }

      function metricCard(title, value, subtitle) {
        return `
          <article class="card">
            <div class="metric-title">${title}</div>
            <div class="metric-value">${value}</div>
            <div class="metric-subtitle">${subtitle}</div>
          </article>
        `;
      }

      function getValue(row, keys) {
        for (const key of keys) {
          if (row[key] !== undefined && row[key] !== null && row[key] !== '') {
            return row[key];
          }
        }
        return '';
      }

      function renderDashboard(data) {
        const summary = data.summary || {};
        metricsEl.innerHTML = [
          metricCard('Customers analyzed', (summary.customer_count || 0).toLocaleString(), 'Unique customers in the latest export'),
          metricCard('Churn rate', formatPercent(summary.churn_rate), 'Share of customers expected to churn'),
          metricCard('Value clusters', summary.cluster_count || 0, 'Behavior-based customer segments'),
          metricCard('High-risk customers', (summary.high_risk_count || 0).toLocaleString(), 'Customers above 70% churn probability')
        ].join('');

        riskEl.innerHTML = (data.risky_customers || []).slice(0, 4).map(item => {
          const name = getValue(item, ['customer_name', 'Customer_Name', 'customerName']);
          const risk = getValue(item, ['Predicted_Churn_Prob', 'predicted_churn_prob', 'churn_prob']);
          const value = getValue(item, ['Monetary', 'monetary', 'value']);
          return `
            <div class="risk-item">
              <strong>${name || 'Customer'}</strong>
              <div class="muted">Estimated churn risk: ${formatPercent(risk)}</div>
              <div class="muted">Historical value: ${formatCurrency(value)}</div>
            </div>
          `;
        }).join('') || '<div class="muted">No high-risk customers were identified.</div>';

        clustersEl.innerHTML = (data.clusters || []).map(item => `
          <tr>
            <td>Cluster ${getValue(item, ['Cluster_ID', 'cluster_id'])}</td>
            <td>${getValue(item, ['Customers', 'customers'])}</td>
            <td>${formatCurrency(getValue(item, ['Avg_Monetary', 'avg_monetary']))}</td>
            <td>${formatPercent(getValue(item, ['Actual_Churn_Rate', 'actual_churn_rate', 'churn_rate']))}</td>
          </tr>
        `).join('');

        customersEl.innerHTML = (data.customers || []).map(item => {
          const name = getValue(item, ['customer_name', 'Customer_Name', 'customerName']);
          const monetary = getValue(item, ['Monetary', 'monetary']);
          const churn = getValue(item, ['Churn', 'churn']);
          const cluster = getValue(item, ['Cluster_ID', 'cluster_id']);
          return `
            <tr>
              <td>${name || 'Customer'}</td>
              <td>${formatCurrency(monetary)}</td>
              <td>${Number(churn) === 1 ? '<span class="badge badge-risk">Churned</span>' : '<span class="badge badge-safe">Retained</span>'}</td>
              <td>${cluster || 'N/A'}</td>
            </tr>
          `;
        }).join('');

        productsEl.innerHTML = (data.products || []).map(item => `
          <tr>
            <td>${getValue(item, ['product_name', 'Product_Name', 'productName']) || 'Product'}</td>
            <td>${formatCurrency(getValue(item, ['Total_Revenue', 'total_revenue']))}</td>
            <td>${getValue(item, ['Total_Quantity_Sold', 'total_quantity_sold'])}</td>
          </tr>
        `).join('');

        ageEl.innerHTML = (data.age_segments || []).map(item => `
          <tr>
            <td>${getValue(item, ['Age_Band', 'age_band']) || 'Unknown'}</td>
            <td>${getValue(item, ['Customers', 'customers'])}</td>
            <td>${formatCurrency(getValue(item, ['Avg_Monetary', 'avg_monetary']))}</td>
            <td>${formatPercent(getValue(item, ['Churn_Rate', 'churn_rate']))}</td>
          </tr>
        `).join('');

        statusEl.textContent = 'Dashboard refreshed from the latest analysis export.';
      }

      async function loadSummary() {
        statusEl.textContent = 'Loading latest insight data…';
        const response = await fetch('/api/analysis/summary');
        const data = await response.json();
        renderDashboard(data);
      }

      async function uploadFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.csv,.xlsx,.xls';
        input.onchange = async () => {
          const file = input.files[0];
          if (!file) return;
          const formData = new FormData();
          formData.append('file', file);
          statusEl.textContent = 'Uploading file…';
          const response = await fetch('/api/upload', { method: 'POST', body: formData });
          const data = await response.json();
          statusEl.textContent = `Uploaded ${data.filename || 'file'} with ${data.rows || 0} rows.`;
          loadSummary();
        };
        input.click();
      }

      loadSummary();
    </script>
  </body>
</html>
